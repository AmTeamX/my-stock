<!doctype html>
<html lang="th">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>MyStock Rich Menu v2 2500×1686</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                width: 2500px;
                height: 1686px;
                overflow: hidden;
                font-family:
                    "Noto Sans Thai",
                    "Kanit",
                    -apple-system,
                    sans-serif;
                background: #f0fdf4;
            }

            .container {
                width: 100%;
                height: 100%;
                display: flex;
                flex-direction: column;
            }

            /* Header */
            .header {
                background: #06c755;
                padding: 40px 80px 30px;
                color: white;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            .header-left {
                display: flex;
                align-items: center;
                gap: 20px;
            }
            .header-logo {
                width: 80px;
                height: 80px;
                background: rgba(255, 255, 255, 0.2);
                border-radius: 22px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 50px;
            }
            .header h1 {
                font-size: 52px;
                font-weight: 800;
                letter-spacing: -0.5px;
            }
            .header p {
                font-size: 26px;
                opacity: 0.8;
                margin-top: 2px;
            }
            .header-badge {
                background: rgba(255, 255, 255, 0.15);
                padding: 12px 28px;
                border-radius: 40px;
                font-size: 24px;
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .badge-dot {
                width: 16px;
                height: 16px;
                background: #4ade80;
                border-radius: 50%;
            }

            /* Grid */
            .grid {
                flex: 1;
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                grid-template-rows: 1fr 1fr;
                gap: 4px;
                background: #d1d5db;
                padding: 4px;
            }

            .card {
                background: white;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 12px;
                position: relative;
                overflow: hidden;
            }

            .card-icon {
                width: 120px;
                height: 120px;
                border-radius: 30px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 60px;
            }

            .card-label {
                font-size: 38px;
                font-weight: 700;
                color: #1f2937;
            }
            .card-sub {
                font-size: 22px;
                color: #9ca3af;
                margin-top: -6px;
            }

            .bg-green {
                background: #dcfce7;
            }
            .bg-blue {
                background: #dbeafe;
            }
            .bg-orange {
                background: #fff7ed;
            }
            .bg-purple {
                background: #f3e8ff;
            }
            .bg-yellow {
                background: #fefce8;
            }
            .bg-pink {
                background: #fce7f3;
            }

            /* Footer */
            .footer {
                background: #f8fafc;
                padding: 20px 80px;
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 30px;
                border-top: 1px solid #e5e7eb;
            }
            .footer span {
                font-size: 20px;
                color: #9ca3af;
            }
            .footer .brand {
                font-weight: 700;
                color: #06c755;
                font-size: 24px;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <!-- Header -->
            <div class="header">
                <div class="header-left">
                    <div class="header-logo">📦</div>
                    <div>
                        <h1>MyStock</h1>
                        <p>จัดการคลังเวชภัณฑ์</p>
                    </div>
                </div>
                <div class="header-badge">
                    <div class="badge-dot"></div>
                    พร้อมใช้งาน
                </div>
            </div>

            <!-- Menu Grid -->
            <div class="grid">
                <div class="card">
                    <div class="card-icon bg-green">📦</div>
                    <div class="card-label">ดูสต็อก</div>
                    <div class="card-sub">เช็คของทั้งหมด</div>
                </div>
                <div class="card">
                    <div class="card-icon bg-blue">➕</div>
                    <div class="card-label">เพิ่มสต็อก</div>
                    <div class="card-sub">เติมของเข้า Stock</div>
                </div>
                <div class="card">
                    <div class="card-icon bg-orange">📤</div>
                    <div class="card-label">เบิกของ</div>
                    <div class="card-sub">ตัดสต็อก</div>
                </div>
                <div class="card">
                    <div class="card-icon bg-purple">📋</div>
                    <div class="card-label">ประวัติ</div>
                    <div class="card-sub">ดูรายการย้อนหลัง</div>
                </div>
                <div class="card">
                    <div class="card-icon bg-yellow">⚙️</div>
                    <div class="card-label">ตั้งค่า</div>
                    <div class="card-sub">วอร์ด & แจ้งเตือน</div>
                </div>
                <div class="card">
                    <div class="card-icon bg-pink">📞</div>
                    <div class="card-label">ติดต่อ</div>
                    <div class="card-sub">ติดต่อแอดมิน</div>
                </div>
            </div>

            <!-- Footer -->
            <div class="footer">
                <span>LINE LIFF</span>
                <span class="brand">🏥 MyStock v2</span>
                <span>Multi-Ward</span>
            </div>
        </div>
    </body>
</html>
